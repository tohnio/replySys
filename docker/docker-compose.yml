version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: ${PROJECT_NAME}_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - replysys-network

  queue:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: ${PROJECT_NAME}_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../:/var/www/html
    depends_on:
      - db
      - redis
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    networks:
      - replysys-network

  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ../:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - replysys-network

  db:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - replysys-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ${PROJECT_NAME}_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT}:80"
    depends_on:
      - db
    networks:
      - replysys-network

  phpmyadmin-stopper:
    image: docker:cli
    container_name: ${PROJECT_NAME}_phpmyadmin_stopper
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "sleep 3600 && docker stop ${PROJECT_NAME}_phpmyadmin"
    depends_on:
      - phpmyadmin

  redis:
    image: redis:alpine
    container_name: ${PROJECT_NAME}_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - replysys-network

  n8n:
    image: n8nio/n8n:latest
    container_name: ${PROJECT_NAME}_n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT}:5678"
    environment:
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - WEBHOOK_URL=http://localhost:9082/

    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - replysys-network

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: ${PROJECT_NAME}_evolution_api
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT}:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:${EVOLUTION_PORT}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_pass@evolution-db:5432/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO
      - DEL_INSTANCE=false
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://n8n:5678/webhook/evolution-whatsapp-response-webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - db
      - redis
      - evolution-db
    networks:
      - replysys-network

  evolution-db:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME}_evolution_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution_pass
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - replysys-network

networks:
  replysys-network:
    driver: bridge

volumes:
  db_data:
  n8n_data:
  evolution_db_data:
  evolution_instances:
